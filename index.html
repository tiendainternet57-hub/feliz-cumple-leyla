<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños ❤️</title>
<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:radial-gradient(circle,#1a001f,#000);
    color:#fff;
}
#start,#intro{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:#000;z-index:20}
#intro{display:none}
button{padding:12px 22px;border:none;border-radius:12px;background:pink;font-weight:bold;cursor:pointer}
.hidden{display:none}
#content{
    display:none;
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    background:radial-gradient(circle,#1a001f,#000);
    overflow:hidden;
}
.card{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.08);backdrop-filter:blur(10px);padding:18px;border-radius:18px;box-shadow:0 0 20px pink}
.message{position:fixed;right:10px;bottom:10px;width:min(320px,88vw);height:200px;background:rgba(0,0,0,.75);border:2px solid pink;border-radius:14px;padding:10px;overflow:auto;display:none}
.photo{position:fixed;width:110px;height:110px;border-radius:20px;object-fit:cover;opacity:.8;animation:fly linear infinite}
@keyframes fly{
0%{transform:translate(var(--x),110vh) rotate(0)}
25%{transform:translate(calc(var(--x) + var(--dx)),70vh) rotate(90deg)}
50%{transform:translate(calc(var(--x) - var(--dx)),40vh) rotate(180deg)}
75%{transform:translate(calc(var(--x) + calc(var(--dx)/2)),5vh) rotate(270deg)}
100%{transform:translate(var(--x),-150px) rotate(360deg)}
}
.heart,.txt{position:fixed;pointer-events:none}
.heart{animation:fall 4s linear forwards}
@keyframes fall{to{transform:translateY(110vh);opacity:0}}
.txt{color:pink;animation:textUp 9s linear forwards}
@keyframes textUp{from{transform:translateY(100vh);opacity:0}20%{opacity:1}to{transform:translateY(-150px);opacity:0}}
#count{font-size:64px;color:pink}
#envelope{font-size:90px;cursor:pointer;animation:bounce 1.5s infinite}
@keyframes bounce{50%{transform:translateY(-10px)}}
#final{display:none;position:fixed;inset:0;justify-content:center;align-items:center;font-size:52px;color:pink;text-shadow:0 0 20px hotpink;background:rgba(0,0,0,.2)}
</style>
</head>
<body>
<audio id="music" loop><source src="music.mp3" type="audio/mp3"></audio>

<div id="start">
<h1>💖 Hay algo que preparé especialmente para ti...</h1>
<p>Espero que te saque una sonrisa ✨</p>
<button onclick="begin()">🎁 Comenzar</button>
</div>

<div id="intro">
<div id="envelope" onclick="openEnvelope()">💌</div>
<p>Toca el sobre para abrir tu sorpresa</p>
<div id="count"></div>
</div>

<div id="content">
<div class="card">
<h1>🎂 Feliz Cumpleaños Leyla ❤️</h1>
<button onclick="showMsg()">💌 Leer mi mensaje</button>
</div>
<div class="message" id="msg"></div>
</div>

<div id="final">LEYLA ❤️</div>

<script>
const frases=["💖 Te quiero","🌹 Feliz cumpleaños","✨ Eres especial","💕 Nunca cambies","🎂 Disfruta tu día"];
const mensaje=`💖 Leyla... ✨🌹

Hoy es un día muy especial porque es el dia que nacio la chica que jamas imagine querer tanto🎂💫

Quiero que sepas que eres una persona ✨ increíble ✨, única y muy valiosa para mi💕🌷
No solo por cómo eres por fuera porque sabes que eres muy linda, sino por la forma en la que haces sentir a las personas a tu alrededor en especial a mi ❤️✨

Tu forma de ser ilumina todo sin que te des cuenta 🌟💫
A veces no imaginas el impacto tan bonito que tienes en los demás… pero es enorme 💖🌹

Gracias por cada momento 💕, por cada sonrisa 😊, por cada palabra 💬 y por todo lo que me dejaste compartir contigo 🌷✨
Incluso los pequeños detalles contigo se sienten importantes 💖💫

Me alegra mucho haberte conocido 💕 de verdad 🌹

No siempre sé expresar bien lo que siento 😅…
pero hoy quiero intentarlo mejor 💭💖

Te quiero muchísimo ❤️✨💖  
y siempre voy a desear lo mejor para ti 🌷💫  
hoy y siempre 💕✨`;

function begin(){start.style.display='none';intro.style.display='flex';}
function openEnvelope(){
 envelope.style.display='none';
 let n=3;count.textContent=n+" ❤️";
 let i=setInterval(()=>{
   n--;
   if(n>0)count.textContent=n+" ❤️";
   else if(n===0)count.textContent="✨";
   else{
     clearInterval(i);
     intro.style.display='none';
     content.style.display='block';
     music.play().catch(()=>{});
   }
 },1000);
}
function showMsg(){msg.style.display='block';type(mensaje,msg,28)}
function type(t,e,s){e.innerHTML="";let i=0;(function w(){if(i<t.length){e.innerHTML+=(t[i]=="\n"?"<br>":t[i]);e.scrollTop=e.scrollHeight;i++;setTimeout(w,t[i-1]=='.'?180:s)}else finale()})()}
function finale(){for(let i=0;i<80;i++)heart();setTimeout(()=>final.style.display='flex',1200)}
function heart(){let h=document.createElement('div');h.className='heart';h.textContent=Math.random()>.5?'❤️':'💖';h.style.left=Math.random()*100+'vw';h.style.top='-20px';h.style.fontSize=(16+Math.random()*20)+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),4000)}
setInterval(heart,220);
setInterval(()=>{let t=document.createElement('div');t.className='txt';t.textContent=frases[Math.floor(Math.random()*frases.length)];t.style.left=Math.random()*95+'vw';document.body.appendChild(t);setTimeout(()=>t.remove(),9000)},1500);
for(let i=0;i<16;i++){let p=document.createElement('img');p.className='photo';p.src='https://picsum.photos/300/300?random='+((i%4)+1);p.style.setProperty('--x',Math.random()*90+'vw');p.style.setProperty('--dx',(20+Math.random()*80)+'px');p.style.animationDuration=(10+Math.random()*10)+'s';document.body.appendChild(p);}
</script>
</body>
</html>
