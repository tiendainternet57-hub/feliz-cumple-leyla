<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #1a001f, #000);
  overflow-x: hidden;
  color: white;
  text-align: center;
}

/* inicio */
#start {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

button {
  padding: 12px 25px;
  border: none;
  background: pink;
  color: black;
  font-weight: bold;
  border-radius: 10px;
  cursor: pointer;
}

/* contenido */
.container {
  display: none;
  padding-top: 40px;
}

/* carta */
.card {
  margin: auto;
  width: 85%;
  max-width: 420px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 0 25px pink;
  animation: pulse 4s infinite;
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.02);}
  100% {transform: scale(1);}
}

h1.main {
  font-size: 34px;
  color: #ff4da6;
  text-shadow: 0 0 20px pink;
}

/* ❤️ corazones */
.heart {
  position: absolute;
  color: pink;
  font-size: 18px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10%); opacity: 1;}
  100% {transform: translateY(110vh); opacity: 0;}
}

/* 🌌 imágenes ultra libres */
.bg-photo {
  position: fixed;
  width: 140px;
  height: 140px;
  object-fit: cover;
  border-radius: 25px;
  opacity: 0.8;
  pointer-events: none;
  box-shadow: 0 0 25px rgba(255,105,180,0.8);
  animation: floatGod linear infinite;
}

@keyframes floatGod {
  0% {transform: translate(var(--x), 110vh) rotate(0deg);}
  25% {transform: translate(calc(var(--x) + 80px), 70vh) rotate(90deg);}
  50% {transform: translate(calc(var(--x) - 60px), 40vh) rotate(180deg);}
  75% {transform: translate(calc(var(--x) + 40px), 10vh) rotate(270deg);}
  100% {transform: translate(var(--x), -200px) rotate(360deg);}
}

/* 💬 ventana */
.message-box {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 300px;
  height: 200px;
  background: rgba(0,0,0,0.8);
  border: 2px solid pink;
  border-radius: 15px;
  padding: 10px;
  box-shadow: 0 0 25px pink;
  overflow-y: auto;
  display: none;
  z-index: 20;
}

/* botón */
#openMsgBtn {
  position: fixed;
  bottom: 230px;
  right: 20px;
  z-index: 21;
}

/* 💖 textos flotantes */
.floating-text {
  position: absolute;
  color: pink;
  font-size: 14px;
  animation: floatText 10s linear infinite;
}

@keyframes floatText {
  0% {transform: translateY(100vh); opacity: 0;}
  20% {opacity: 1;}
  100% {transform: translateY(-200px); opacity: 0;}
}

/* 🌹 FINAL NAME */
.final-name {
  font-size: 50px;
  color: pink;
  text-shadow: 0 0 20px hotpink, 0 0 40px pink;
  display: none;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from {transform: scale(1);}
  to {transform: scale(1.1);}
}

/* móvil */
@media (max-width: 600px) {
  .message-box {
    width: 90%;
    right: 5%;
    bottom: 10px;
  }
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<!-- inicio -->
<div id="start">
  <h1>🎂 Hoy es tu día especial</h1>
  <button onclick="entrar()">Entrar 💖</button>
</div>

<!-- contenido -->
<div class="container" id="content">
  <div class="card">
    <h1 class="main">🎂 Feliz Cumpleaños 💖</h1>
    <p>Hoy el mundo sonríe porque tú existes ✨</p>

    <div id="finalName" class="final-name">LEYLA ❤️</div>
  </div>
</div>

<!-- botón -->
<button id="openMsgBtn" onclick="abrirMensaje()">💌 Mensaje</button>

<!-- ventana -->
<div class="message-box" id="messageBox"></div>

<!-- imágenes (muchas más) -->
<img class="bg-photo" src="https://picsum.photos/300/300?random=1" style="--x: 5vw; animation-duration: 14s;">
<img class="bg-photo" src="https://picsum.photos/300/300?random=2" style="--x: 15vw; animation-duration: 18s;">
<img class="bg-photo" src="https://picsum.photos/300/300?random=3" style="--x: 25vw; animation-duration: 12s;">
<img class="bg-photo" src="https://picsum.photos/300/300?random=4" style="--x: 35vw; animation-duration: 16s;">
<img class="bg-photo" src="https://picsum.photos/300/300?random=1" style="--x: 45vw; animation-duration: 20s;">
<img class="bg-photo" src="https://picsum.photos/300/300?random=2" style="--x: 55vw; animation-duration: 13s;">
<img class="bg-photo" src="https://picsum.photos/300/300?random=3" style="--x: 65vw; animation-duration: 17s;">
<img class="bg-photo" src="https://picsum.photos/300/300?random=4" style="--x: 75vw; animation-duration: 15s;">

<script>

function entrar() {
  document.getElementById("start").style.display = "none";
  document.getElementById("content").style.display = "block";

  const music = document.getElementById("music");
  music.volume = 0.5;
  music.play().catch(()=>{});
}

/* 💖 MENSAJE FINAL DIOS */
const mensaje = `💖 Leyla... ✨🌹

Hoy es un día muy especial porque el mundo celebra tu existencia 🎂💫

Quiero que sepas que eres una persona ✨ increíble ✨, única y muy valiosa para mi💕🌷
No solo por cómo eres por fuera porque sabes que eres muy linda, sino por la forma en la que haces sentir a las personas a tu alrededor en especial a mi ❤️✨

Tu forma de ser ilumina todo sin que te des cuenta 🌟💫
A veces no imaginas el impacto tan bonito que tienes en los demás… pero es enorme 💖🌹

Gracias por cada momento 💕, por cada sonrisa 😊, por cada palabra 💬 y por todo lo que me dejaste compartir contigo 🌷✨
Incluso los pequeños detalles contigo se sienten importantes 💖💫

Me alegra mucho haberte conocido 💕 de verdad 🌹

No siempre sé expresar bien lo que siento 😅…
pero hoy quiero intentarlo mejor 💭💖

Te quiero muchísimo ❤️✨💖  
y siempre voy a desear lo mejor para ti 🌷💫  
hoy y siempre 💕✨`;

/* escritura */
function typeWriter(text, element, speed = 35) {
  let i = 0;
  element.innerHTML = "";

  function escribir() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(escribir, speed);
    } else {
      explosionFinal();
    }
  }
  escribir();
}

function abrirMensaje() {
  const box = document.getElementById("messageBox");
  box.style.display = "block";
  typeWriter(mensaje, box, 60);
}

/* 💥 EXPLOSIÓN FINAL */
function explosionFinal() {
  for (let i = 0; i < 40; i++) {
    const heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.style.position = "fixed";
    heart.style.left = "50%";
    heart.style.top = "50%";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    heart.style.color = "pink";
    heart.style.animation = "fall 2s linear forwards";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 2000);
  }

  document.getElementById("finalName").style.display = "block";
}

/* corazones */
function crearCorazon() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (2 + Math.random() * 3) + "s";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}
setInterval(crearCorazon, 200);

/* textos */
const frases = ["💖 Te amo","✨ Eres especial","🌹 Feliz cumpleaños","💘 Mi persona favorita"];

function crearTexto() {
  const t = document.createElement("div");
  t.classList.add("floating-text");
  t.innerHTML = frases[Math.floor(Math.random()*frases.length)];
  t.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 10000);
}
setInterval(crearTexto, 1500);

</script>

</body>
</html>
