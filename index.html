<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #1a001f, #000);
  overflow-x: hidden;
  color: white;
  text-align: center;
}

/* 🎬 inicio */
#start {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

button {
  padding: 12px 25px;
  border: none;
  background: pink;
  color: black;
  font-weight: bold;
  border-radius: 10px;
  cursor: pointer;
}

/* contenido */
.container {
  display: none;
  padding-top: 40px;
}

/* 💌 carta */
.card {
  margin: auto;
  width: 85%;
  max-width: 420px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 0 25px pink;
}

/* 🎂 título */
h1.main {
  font-size: 40px;
  color: #ff4da6;
  text-shadow: 0 0 20px pink;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { transform: scale(1); text-shadow: 0 0 10px pink; }
  to { transform: scale(1.05); text-shadow: 0 0 30px hotpink; }
}

/* ❤️ corazones */
.heart {
  position: absolute;
  color: pink;
  font-size: 18px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10%); opacity: 1;}
  100% {transform: translateY(110vh); opacity: 0;}
}

/* 🌌 fotos 3D */
.bg-photo {
  position: fixed;
  width: 140px;
  height: 140px;
  object-fit: cover;
  border-radius: 20px;
  opacity: 0.15;
  pointer-events: none;
  box-shadow: 0 0 25px rgba(255, 105, 180, 0.5);
  animation: float3d 12s infinite ease-in-out;
}

@keyframes float3d {
  0% { transform: translateY(100vh) rotateY(0deg); }
  50% { transform: translateY(40vh) rotateY(180deg); }
  100% { transform: translateY(-200px) rotateY(360deg); }
}

/* 💖 frases flotantes */
.floating-text {
  position: absolute;
  font-size: 16px;
  color: pink;
  opacity: 0.7;
  animation: floatText 10s linear infinite;
}

@keyframes floatText {
  0% { transform: translateY(100vh); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}

/* 📱 MÓVIL */
@media (max-width: 600px) {

  .card {
    width: 90%;
    padding: 18px;
  }

  h1.main {
    font-size: 28px;
  }

  .bg-photo {
    width: 90px;
    height: 90px;
    opacity: 0.12;
  }

  .floating-text {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<!-- 🎵 música -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<!-- 🎬 inicio -->
<div id="start">
  <h1>🎂 Hoy es un día especial...</h1>
  <p>Prepárate ❤️</p>
  <button onclick="entrar()">Entrar 💖</button>
</div>

<!-- 💝 contenido -->
<div class="container" id="content">

  <div class="card">

    <h1 class="main">🎂 Feliz Cumpleaños 💖</h1>

    <p>Hoy el mundo es más bonito porque tú existes ✨</p>

    <button onclick="mostrarCarta()">Abrir sorpresa 💌</button>

    <div id="carta" style="display:none; margin-top:15px;">
      <h2>💖 Para ti</h2>

      <p>
        No hay palabras suficientes…<br>
        pero sí sentimientos infinitos ❤️
      </p>

      <button onclick="mostrarFinal()">Siguiente 💞</button>
    </div>

    <div id="final" style="display:none; margin-top:15px;">
      <h2>💘 Mensaje final</h2>
      <p>
        Gracias por ser tú 💖<br>
        y por existir en mi vida ✨
      </p>
    </div>

  </div>
</div>

<!-- 🌌 fotos 3D -->
<img class="bg-photo" src="https://picsum.photos/300/300?random=1" style="left:5%; animation-delay:0s;">
<img class="bg-photo" src="https://picsum.photos/300/300?random=2" style="left:70%; animation-delay:3s;">
<img class="bg-photo" src="https://picsum.photos/300/300?random=3" style="left:30%; animation-delay:6s;">

<script>

// 🎵 entrar
function entrar() {
  document.getElementById("start").style.display = "none";
  document.getElementById("content").style.display = "block";

  const music = document.getElementById("music");
  music.volume = 0.5;
  music.play().catch(()=>{});
}

// 💌 carta
function mostrarCarta() {
  document.getElementById("carta").style.display = "block";
}

// 💞 final
function mostrarFinal() {
  document.getElementById("final").style.display = "block";
}

// ❤️ corazones
function crearCorazon() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (2 + Math.random() * 3) + "s";

  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}
setInterval(crearCorazon, 200);

// 💖 frases flotantes
const frases = [
  "🎂 Feliz Cumpleaños",
  "💖 Eres especial",
  "✨ Te mereces todo",
  "💘 Gracias por existir",
  "🌹 Eres única",
  "💝 Hoy es tu día"
];

function crearFrase() {
  const f = document.createElement("div");
  f.classList.add("floating-text");
  f.innerHTML = frases[Math.floor(Math.random() * frases.length)];

  f.style.left = Math.random() * 100 + "vw";

  document.body.appendChild(f);
  setTimeout(() => f.remove(), 10000);
}
setInterval(crearFrase, 1500);

</script>

</body>
</html>
